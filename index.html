<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QA 語音助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body class="h-screen bg-[#F8FAFC] text-[#1E293B] font-[Inter,sans-serif] flex items-center justify-center">
    <main class="w-full max-w-md px-6 flex flex-col items-center gap-8">

      <!-- Header -->
      <div class="text-center">
        <h1 class="text-2xl font-semibold">QA 語音助手</h1>
        <p class="mt-1 text-sm text-slate-500">你的理財知識問答夥伴</p>
      </div>

      <!-- Error display -->
      <p id="errorText" class="text-xs text-red-500 hidden"></p>

      <!-- Waveform -->
      <div id="waveform" class="items-center justify-center gap-[5px] h-16 hidden" aria-hidden="true">
        <span class="waveform-bar"></span>
        <span class="waveform-bar"></span>
        <span class="waveform-bar"></span>
        <span class="waveform-bar"></span>
        <span class="waveform-bar"></span>
      </div>

      <!-- Status -->
      <p id="statusText" class="text-sm text-slate-400 h-5"></p>

      <!-- Actions -->
      <div class="flex items-center gap-3">
        <button
          id="connectButton"
          class="h-12 px-8 bg-[#2563EB] hover:bg-blue-700 text-white rounded-full text-sm font-medium transition-colors cursor-pointer focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          開始對話
        </button>
        <button
          id="muteButton"
          class="h-12 w-12 rounded-full border-2 border-slate-200 text-slate-500 hover:bg-slate-100 transition-colors cursor-pointer focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40 hidden items-center justify-center"
          aria-label="靜音"
        >
          <!-- mic icon -->
          <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" x2="12" y1="19" y2="22"/>
          </svg>
          <!-- mic-off icon -->
          <svg id="micOffIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
            <line x1="2" x2="22" y1="2" y2="22"/>
            <path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/>
            <path d="M5 10v2a7 7 0 0 0 12 0"/>
            <path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/>
            <path d="M9 9v3a3 3 0 0 0 5.12 2.12"/>
            <line x1="12" x2="12" y1="19" y2="22"/>
          </svg>
        </button>
        <button
          id="disconnectButton"
          class="h-12 px-6 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full text-sm font-medium transition-colors cursor-pointer focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40 hidden"
        >
          結束對話
        </button>
      </div>

      <!-- Citations -->
      <div id="citationsSection" class="w-full hidden">
        <details class="group" open>
          <summary class="flex items-center gap-2 text-xs font-medium text-slate-400 cursor-pointer select-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
              <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
            </svg>
            參考來源
          </summary>
          <ul id="citationsList" class="mt-2 space-y-1"></ul>
        </details>
      </div>

    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
